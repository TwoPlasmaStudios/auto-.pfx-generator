<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PFX Builder · PKCS#12 Generator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #e9f2f9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 32px;
      box-shadow: 0 25px 40px -12px rgba(0, 20, 40, 0.25);
      padding: 28px 30px 34px;
      transition: all 0.2s;
    }
    h1 {
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: -0.01em;
      color: #0a2942;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    h1 span {
      background: #1e4a76;
      color: white;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 40px;
      margin-left: 8px;
    }
    .subhead {
      color: #2c5778;
      margin-bottom: 24px;
      font-weight: 400;
      border-left: 4px solid #2c7eb6;
      padding-left: 16px;
      font-size: 1rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 18px;
    }
    .full-width {
      grid-column: span 2;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #1e4a6b;
    }
    input {
      background: white;
      border: 1.5px solid #d4e0e9;
      border-radius: 18px;
      padding: 12px 16px;
      font-size: 0.95rem;
      transition: border 0.15s, box-shadow 0.15s;
      outline: none;
      color: #0a1e2c;
    }
    input:focus {
      border-color: #1e6ea8;
      box-shadow: 0 0 0 4px rgba(30, 110, 168, 0.15);
    }
    input::placeholder {
      color: #9bb1c2;
      font-weight: 300;
      font-size: 0.9rem;
    }
    .hint {
      font-size: 0.75rem;
      color: #527a9b;
      margin-top: 2px;
    }
    .action-bar {
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .btn {
      background: #0a2942;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 48px;
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 14px rgba(10, 41, 66, 0.2);
      border: 1px solid #1a4b70;
      letter-spacing: 0.2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:hover {
      background: #123a59;
      transform: scale(1.01);
      box-shadow: 0 10px 20px rgba(10, 41, 66, 0.25);
    }
    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.4);
    }
    .btn-outline {
      background: transparent;
      color: #0a2942;
      box-shadow: none;
      border: 1.5px solid #1e4a76;
    }
    .btn-outline:hover {
      background: rgba(30, 74, 118, 0.06);
    }
    #status {
      flex: 1;
      min-width: 180px;
      padding: 8px 16px;
      border-radius: 40px;
      background: #eef3f8;
      font-size: 0.9rem;
      color: #1e4a6b;
      font-weight: 500;
    }
    .download-area {
      margin-top: 22px;
      border-top: 1px dashed #b6d0e2;
      padding-top: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #downloadLink {
      background: #1c6c9c;
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      transition: 0.15s;
      border: 1px solid #3082b3;
    }
    #downloadLink:hover {
      background: #0f4a6f;
    }
    #downloadLink.disabled {
      background: #b0c8db;
      pointer-events: none;
      opacity: 0.6;
      border-color: #9bb1c2;
    }
    .footnote {
      font-size: 0.78rem;
      color: #5f7e99;
      margin-top: 16px;
      text-align: right;
    }
  </style>
  <!-- forge library (crypto / PKCS#12) – embedded via CDN, but kept minimal; 
       the rest of CSS/JS is fully embedded as requested -->
  <script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
</head>
<body>
<div class="card">
  <h1>🔐 PFX Builder <span>PKCS#12</span></h1>
  <div class="subhead">Create a password‑protected .pfx with self‑signed certificate</div>

  <div class="form-grid">
    <div class="input-group full-width">
      <label>Common Name (CN) *</label>
      <input type="text" id="cn" placeholder="myserver.local or your name" value="example.local" required>
      <div class="hint">Primary domain / identity</div>
    </div>
    <div class="input-group">
      <label>Organization (O)</label>
      <input type="text" id="org" placeholder="Acme Inc." value="MyOrg">
    </div>
    <div class="input-group">
      <label>Org. Unit (OU)</label>
      <input type="text" id="ou" placeholder="IT Department" value="Security">
    </div>
    <div class="input-group">
      <label>Country (C)</label>
      <input type="text" id="country" placeholder="US" value="US" maxlength="2" style="text-transform:uppercase">
    </div>
    <div class="input-group">
      <label>State / Province (ST)</label>
      <input type="text" id="state" placeholder="California" value="CA">
    </div>
    <div class="input-group">
      <label>Locality / City (L)</label>
      <input type="text" id="locality" placeholder="San Francisco" value="SF">
    </div>
    <div class="input-group full-width">
      <label>Email Address (E)</label>
      <input type="email" id="email" placeholder="admin@example.local" value="admin@example.local">
    </div>
    <div class="input-group">
      <label>Validity (days)</label>
      <input type="number" id="validity" value="365" min="1" max="3650" step="1">
    </div>
    <div class="input-group">
      <label>PFX Password *</label>
      <input type="password" id="pfxPassword" placeholder="min 4 characters" value="changeit" autocomplete="off">
      <div class="hint">🔑 Required to encrypt private key</div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn" id="generateBtn">⚡ Generate PFX</button>
    <div id="status">Ready · fill details</div>
  </div>

  <div class="download-area">
    <span style="font-weight:500; color:#1e4a6b;">⬇️ Download .pfx file</span>
    <a id="downloadLink" class="disabled">Generate first</a>
  </div>
  <div class="footnote">
    ⚙️ RSA 2048 · Self‑signed · All processing in your browser
  </div>
</div>

<script>
  (function(){
    "use strict";

    // DOM elements
    const cnInput = document.getElementById('cn');
    const orgInput = document.getElementById('org');
    const ouInput = document.getElementById('ou');
    const countryInput = document.getElementById('country');
    const stateInput = document.getElementById('state');
    const localityInput = document.getElementById('locality');
    const emailInput = document.getElementById('email');
    const validityInput = document.getElementById('validity');
    const pwdInput = document.getElementById('pfxPassword');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const downloadLink = document.getElementById('downloadLink');

    // Helper to update status
    function setStatus(msg, isError = false) {
      statusDiv.textContent = msg;
      statusDiv.style.color = isError ? '#b13e3e' : '#1e4a6b';
      statusDiv.style.fontWeight = isError ? '600' : '500';
    }

    // Disable/Enable UI during generation
    function setBusy(busy) {
      generateBtn.disabled = busy;
      if (busy) {
        generateBtn.textContent = '⏳ Generating...';
      } else {
        generateBtn.textContent = '⚡ Generate PFX';
      }
    }

    // Reset download link to disabled state
    function resetDownloadLink() {
      downloadLink.textContent = 'Generate first';
      downloadLink.classList.add('disabled');
      downloadLink.removeAttribute('href');
      downloadLink.removeAttribute('download');
    }

    // Enable download with blob
    function setDownloadReady(blob, filename) {
      const url = URL.createObjectURL(blob);
      downloadLink.href = url;
      downloadLink.download = filename;
      downloadLink.textContent = `📦 ${filename}`;
      downloadLink.classList.remove('disabled');
      // revoke after click? we'll keep it; user can click multiple times.
      // Clean old object URL if any
      if (downloadLink._prevUrl) URL.revokeObjectURL(downloadLink._prevUrl);
      downloadLink._prevUrl = url;
    }

    // Validate inputs
    function validateInputs() {
      if (!cnInput.value.trim()) {
        setStatus('❌ Common Name (CN) is required', true);
        return false;
      }
      const pwd = pwdInput.value;
      if (!pwd || pwd.length < 4) {
        setStatus('❌ Password must be at least 4 characters', true);
        return false;
      }
      const days = parseInt(validityInput.value, 10);
      if (isNaN(days) || days < 1) {
        setStatus('❌ Validity must be a positive number', true);
        return false;
      }
      return true;
    }

    // Build subject attributes from form
    function buildSubjectAttrs() {
      const attrs = [];
      const add = (shortName, value) => {
        if (value && value.trim()) attrs.push({ shortName, value: value.trim() });
      };
      add('CN', cnInput.value);
      add('O', orgInput.value);
      add('OU', ouInput.value);
      add('C', countryInput.value);
      add('ST', stateInput.value);
      add('L', localityInput.value);
      // email is often added as E or emailAddress
      const email = emailInput.value.trim();
      if (email) {
        // forge uses 'emailAddress' or 'E'? 'E' works.
        attrs.push({ shortName: 'E', value: email });
      }
      // ensure at least CN
      if (!attrs.some(a => a.shortName === 'CN')) {
        attrs.push({ shortName: 'CN', value: cnInput.value || 'localhost' });
      }
      return attrs;
    }

    // Main generation
    async function generatePFX() {
      resetDownloadLink();
      if (!validateInputs()) return;

      // Ensure forge is loaded
      if (typeof forge === 'undefined') {
        setStatus('❌ Crypto library (forge) not loaded. Check network.', true);
        return;
      }

      setBusy(true);
      setStatus('🔐 Generating RSA key pair (2048-bit)...');

      try {
        // Use a small delay to let UI update
        await new Promise(resolve => setTimeout(resolve, 20));

        // --- 1. Generate RSA key pair synchronously (forge) ---
        // Using synchronous generation to keep flow simple.
        const keypair = await new Promise((resolve, reject) => {
          try {
            // forge.pki.rsa.generateKeyPair({bits: 2048, workers: -1}, callback) 
            // but we want sync: use generateKeyPair without workers.
            forge.pki.rsa.generateKeyPair({ bits: 2048, workers: -1 }, function(err, keys) {
              if (err) reject(err);
              else resolve(keys);
            });
          } catch (e) {
            reject(e);
          }
        });

        setStatus('📜 Creating X.509 certificate...');
        const cert = forge.pki.createCertificate();
        cert.publicKey = keypair.publicKey;
        
        // serial number
        cert.serialNumber = '01' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');

        // validity
        const now = new Date();
        const notBefore = new Date(now);
        notBefore.setHours(notBefore.getHours() - 1); // a bit of margin
        const notAfter = new Date(now);
        const validityDays = parseInt(validityInput.value, 10) || 365;
        notAfter.setDate(notAfter.getDate() + validityDays);

        cert.validity.notBefore = notBefore;
        cert.validity.notAfter = notAfter;

        // subject & issuer (self-signed)
        const subjectAttrs = buildSubjectAttrs();
        cert.setSubject(subjectAttrs);
        cert.setIssuer(subjectAttrs);  // self-signed

        // extensions (basicConstraints, keyUsage)
        cert.setExtensions([
          {
            name: 'basicConstraints',
            cA: false,
            critical: true
          },
          {
            name: 'keyUsage',
            digitalSignature: true,
            keyEncipherment: true,
            dataEncipherment: true,
            nonRepudiation: false,
            keyAgreement: false,
            keyCertSign: false,
            cRLSign: false
          },
          {
            name: 'extKeyUsage',
            serverAuth: true,
            clientAuth: true,
            codeSigning: false,
            emailProtection: true,
            timeStamping: false
          },
          {
            name: 'subjectAltName',
            altNames: [{
              type: 2, // DNS
              value: cnInput.value.trim() || 'localhost'
            }]
          }
        ]);

        // Sign certificate
        cert.sign(keypair.privateKey, forge.md.sha256.create());
        setStatus('🔏 Certificate signed. Building PKCS#12...');

        // --- 2. Create PKCS#12 (PFX) ---
        const password = pwdInput.value;
        
        // Convert cert and key to forge PKCS#12 structures
        const pemCert = forge.pki.certificateToPem(cert);
        const forgeCert = forge.pki.certificateFromPem(pemCert);
        
        // Create PKCS#12 ASN.1 structure
        const p12Asn1 = forge.pkcs12.toPkcs12Asn1(
          keypair.privateKey,
          [forgeCert],           // array of certificates
          password,
          {
            algorithm: '3des',    // widely compatible
            generateLocalKeyId: true,
            friendlyName: cnInput.value.trim() || 'certificate'
          }
        );

        // Convert ASN.1 to DER (binary)
        const p12Der = forge.asn1.toDer(p12Asn1).getBytes();
        
        // Convert binary string to ArrayBuffer / Uint8Array for Blob
        const binaryStr = p12Der;
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) {
          bytes[i] = binaryStr.charCodeAt(i) & 0xff;
        }
        
        const blob = new Blob([bytes], { type: 'application/x-pkcs12' });
        
        // Prepare filename
        const cnClean = (cnInput.value.trim() || 'cert').replace(/[^a-zA-Z0-9.-]/g, '_');
        const filename = `${cnClean}_${validityDays}d.pfx`;
        
        setDownloadReady(blob, filename);
        setStatus(`✅ PFX ready · ${filename} · protected with password`);
        
      } catch (error) {
        console.error(error);
        setStatus(`❌ Error: ${error.message || 'Generation failed'}`, true);
        resetDownloadLink();
      } finally {
        setBusy(false);
      }
    }

    // Attach event listener
    generateBtn.addEventListener('click', generatePFX);

    // initial status
    setStatus('Enter details · password required');

    // Handle password field hint
    pwdInput.addEventListener('input', function() {
      if (pwdInput.value.length > 0 && pwdInput.value.length < 4) {
        setStatus('⚠️ Password should be at least 4 characters', false);
      } else {
        setStatus('Ready · click Generate', false);
      }
    });

    // Add example fill (optional but nice)
    // prefill defaults already in HTML.

    // Clean object URL on page unload (optional)
    window.addEventListener('beforeunload', function() {
      if (downloadLink._prevUrl) URL.revokeObjectURL(downloadLink._prevUrl);
    });

    // If forge loads slowly, inform (should be fine)
    if (typeof forge === 'undefined') {
      setStatus('⌛ Loading crypto library...', false);
      const check = setInterval(() => {
        if (typeof forge !== 'undefined') {
          setStatus('Ready · forge loaded', false);
          clearInterval(check);
        }
      }, 100);
    }
  })();
</script>
</body>
</html>
